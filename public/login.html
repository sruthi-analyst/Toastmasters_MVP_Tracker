<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Toastmasters MVP Tracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Sri Eshwar Toastmasters — Chapter 2</h1>
      <p>MVP Point Tracker · Admin sign in</p>
      <form id="loginForm">
        <select id="role" required>
          <option value="admin">Admin</option>
          <option value="viewer">Viewer</option>
        </select>
        <input type="password" id="password" placeholder="Password" autofocus required>
        <button type="submit">Sign in</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, role })
        });
        if (res.ok) {
          if (role === 'viewer') {
            window.location.href = '/viewer.html';
          } else {
            window.location.href = '/index.html';
          }
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.error || 'Incorrect password';
        }
      } catch (err) {
        errEl.textContent = 'Could not reach the server. Try again.';
      }
    });
  </script>
</body>

</html>
